{% extends "account/base.html" %}
{% load i18n %}

{% block title %}Change Password | LaunchDev{% endblock %}

{% block account_content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background:#F8FAFC;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">

        <div class="card border-0 shadow-sm" style="border-radius:16px;">
          <div class="card-body p-4 p-md-5">

            <h2 class="fw-bold mb-1" style="font-size:1.4rem;">Change Password</h2>
            <p class="text-muted small mb-4">Update your account password below.</p>

            <hr class="mb-4">

            <form method="POST" action="{% url 'account_change_password' %}">
              {% csrf_token %}
              {{ form.as_p }}
              <button type="submit" class="btn btn-primary w-100 fw-semibold mt-2" style="border-radius:10px;">
                {% trans "Change Password" %}
              </button>
            </form>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
